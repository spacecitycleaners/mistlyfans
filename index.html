<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mistly Fans | Premium Misting Fans </title>
    <link class="rounded-full" rel="icon" type="image/png" href="Images/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #fafafc; }
        .cart-badge { transition: all 0.2s ease; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #eef2f6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        #mobile-menu {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: top;
        }
        .hamburger-line {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .menu-open .line-top { transform: translateY(6px) rotate(45deg); }
        .menu-open .line-mid { opacity: 0; transform: scale(0); }
        .menu-open .line-bot { transform: translateY(-6px) rotate(-45deg); }

        .video-slot { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .video-slot.faded { opacity: 0.45; transform: scale(0.88); pointer-events: none; }
        .video-slot.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        #video-carousel-wrapper { touch-action: pan-y; }
    </style>
</head>

                    <button onclick="navigateTo('shop')" class="hover:text-black transition border-b-2 border-transparent hover:border-black pb-1">Shop Fans</button>
